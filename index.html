<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Arrizo Fuel</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030308">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Arrizo">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root {
            --bg-deep: #030308;
            --neon-primary: #a855f7;
            --neon-cyan: #22d3ee;
            --neon-red: #ff0055;
            --neon-gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 40%);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header { text-align: center; margin-bottom: 10px; }
        .header h1 { 
            font-size: 26px; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--neon-primary);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .input-box { text-align: center; }
        .main-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 72px;
            font-weight: 900;
            width: 100%;
            text-align: center;
            outline: none;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .input-label { color: var(--neon-cyan); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; display: block; }

        .neon-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 100px;
            margin-top: 15px;
            padding: 2px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .neon-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .res-row { display: flex; justify-content: space-between; align-items: center; }
        .res-value { font-size: 38px; font-weight: 800; color: #fff; }
        .res-unit { font-size: 16px; color: var(--neon-primary); margin-left: 5px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-card { padding: 20px; text-align: left; }
        .grid-val { font-size: 20px; font-weight: 700; display: block; margin-top: 5px; }
        .grid-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; }

        .settings-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .set-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 10px;
            border-radius: 15px;
            width: 90px;
            text-align: right;
            font-weight: 700;
            outline: none;
        }

        #alert {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(255, 0, 85, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-red);
            padding: 15px;
            border-radius: 20px;
            color: #fff;
            text-align: center;
            font-weight: 700;
            display: none;
            box-shadow: 0 0 20px var(--neon-red);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Arrizo Fuel</h1>
        </div>

        <div class="glass-card input-box">
            <span class="input-label">Уровень топлива</span>
            <input type="number" id="pct" class="main-input" placeholder="0" inputmode="decimal">
            <div class="neon-bar-bg">
                <div id="bar" class="neon-bar-fill"></div>
            </div>
        </div>

        <div class="glass-card res-row">
            <div>
                <span class="grid-label">В баке сейчас</span>
                <div class="res-value"><span id="liters">0.0</span><span class="res-unit">L</span></div>
            </div>
            <div style="text-align: right">
                <span class="grid-label">Процент</span>
                <div id="pct_val" style="font-weight: 800; color: var(--neon-cyan)">0%</div>
            </div>
        </div>

        <div class="grid">
            <div class="glass-card grid-card">
                <span class="grid-label">Запас хода</span>
                <span class="grid-val" id="range" style="color: var(--neon-cyan);">0 км</span>
            </div>
            <div class="glass-card grid-card">
                <span class="grid-label">До полного</span>
                <span class="grid-val" id="costToFull" style="color: var(--neon-gold);">0 ₽</span>
            </div>
        </div>

        <div class="glass-card">
            <span class="input-label" style="margin-bottom: 20px;">Параметры</span>
            <div class="settings-item">
                <span class="grid-label">Бак (л)</span>
                <input type="number" id="sTank" class="set-input" value="60">
            </div>
            <div class="settings-item">
                <span class="grid-label">Расход</span>
                <input type="number" id="sCons" class="set-input" value="8.5">
            </div>
            <div class="settings-item">
                <span class="grid-label">Цена за литр</span>
                <input type="number" id="sPrice" class="set-input" value="55">
            </div>
        </div>
    </div>

    <div id="alert">⚠️ МАЛО ТОПЛИВА</div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const input = document.getElementById('pct');
        const sTank = document.getElementById('sTank');
        const sCons = document.getElementById('sCons');
        const sPrice = document.getElementById('sPrice');
        const bar = document.getElementById('bar');

        function load() {
            if(localStorage.getItem('n_t')) sTank.value = localStorage.getItem('n_t');
            if(localStorage.getItem('n_c')) sCons.value = localStorage.getItem('n_c');
            if(localStorage.getItem('n_p')) sPrice.value = localStorage.getItem('n_p');
        }

        function save() {
            localStorage.setItem('n_t', sTank.value);
            localStorage.setItem('n_c', sCons.value);
            localStorage.setItem('n_p', sPrice.value);
        }

        function update() {
            let p = parseFloat(input.value);
            if (isNaN(p)) p = 0;
            if (p > 100) { p = 100; input.value = 100; }
            if (p < 0) { p = 0; input.value = 0; }

            const tank = parseFloat(sTank.value) || 0;
            const cons = parseFloat(sCons.value) || 1;
            const price = parseFloat(sPrice.value) || 0;

            // Расчеты
            const currentLiters = (p / 100) * tank;
            const remainingKm = (currentLiters / cons) * 100;
            
            // Расчет "До полного"
            const litersToFull = tank - currentLiters;
            const moneyToFull = litersToFull * price;

            // Вывод данных
            document.getElementById('liters').innerText = currentLiters.toFixed(1);
            document.getElementById('range').innerText = Math.round(remainingKm) + ' км';
            document.getElementById('costToFull').innerText = Math.round(moneyToFull).toLocaleString() + ' ₽';
            document.getElementById('pct_val').innerText = Math.round(p) + '%';

            // Прогресс бар и цвета
            bar.style.width = p + '%';
            let neonColor = 'var(--neon-cyan)';
            if (p <= 40) neonColor = 'var(--neon-gold)';
            if (p <= 15) neonColor = 'var(--neon-red)';
            bar.style.background = neonColor;
            bar.style.boxShadow = `0 0 15px ${neonColor}`;

            // Алерт
            document.getElementById('alert').style.display = (input.value !== '' && p <= 12) ? 'block' : 'none';
            save();
        }

        [input, sTank, sCons, sPrice].forEach(e => e.addEventListener('input', update));
        window.onload = () => { load(); update(); };
    </script>
</body>
</html>
